<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>xdayoungx Hub</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>
:root{
    --bg:#050505;
    --card:#0f1115;
    --card2:#151922;
    --border:#262b36;
    --text:#ffffff;
    --muted:#9ca3af;
    --green:#22c55e;
    --green2:#16a34a;
    --blue:#3b82f6;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,"Segoe UI",sans-serif;
}

body{
    min-height:100vh;
    background:
    radial-gradient(circle at top,#111827 0%,#050505 45%),
    #050505;
    color:var(--text);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:25px;
}

.container{
    width:100%;
    max-width:850px;
}

.card{
    background:rgba(15,17,21,.92);
    backdrop-filter:blur(15px);
    border:1px solid var(--border);
    border-radius:28px;
    overflow:hidden;
    box-shadow:
    0 0 40px rgba(34,197,94,.08),
    0 30px 80px rgba(0,0,0,.65);
}

.header{
    padding:40px;
    position:relative;
}

.header::after{
    content:"";
    position:absolute;
    top:-120px;
    right:-120px;
    width:260px;
    height:260px;
    background:rgba(34,197,94,.08);
    filter:blur(60px);
    border-radius:50%;
}

.logo{
    width:78px;
    height:78px;
    border-radius:20px;
    background:linear-gradient(135deg,#111827,#1f2937);
    border:1px solid #2d3748;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:20px;
}

.logo i{
    font-size:30px;
    color:var(--green);
}

.title{
    display:flex;
    align-items:center;
    gap:12px;
    font-size:34px;
    font-weight:800;
    margin-bottom:12px;
}

.online-dot{
    width:12px;
    height:12px;
    background:var(--green);
    border-radius:50%;
    position:relative;
}

.online-dot::before{
    content:"";
    position:absolute;
    inset:-7px;
    border-radius:50%;
    background:rgba(34,197,94,.4);
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);opacity:.8;}
    100%{transform:scale(2.5);opacity:0;}
}

.subtitle{
    color:var(--muted);
    line-height:1.8;
}

.content{
    padding:0 40px 40px;
}

.badges{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:25px;
}

.badge{
    background:#111827;
    border:1px solid #1f2937;
    padding:10px 15px;
    border-radius:999px;
    color:#d1d5db;
    font-size:13px;
}

.badge i{
    margin-right:6px;
    color:var(--green);
}

.script-card{
    background:var(--card2);
    border:1px solid var(--border);
    border-radius:18px;
    padding:20px;
    margin-bottom:18px;
}

.script-title{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:700;
    margin-bottom:15px;
}

.script-title i{
    color:var(--green);
}

.code-box{
    background:#090b10;
    border:1px solid #20242d;
    border-radius:14px;
    padding:18px;
    margin-bottom:15px;
    overflow-x:auto;
}

.code-box code{
    color:#7dd3fc;
    font-size:14px;
    word-break:break-all;
}

.copy-btn{
    width:100%;
    border:none;
    background:linear-gradient(135deg,var(--green),var(--green2));
    color:white;
    font-weight:700;
    padding:14px;
    border-radius:14px;
    cursor:pointer;
    transition:.2s;
}

.copy-btn:hover{
    transform:translateY(-2px);
}

.copy-btn i{
    margin-right:8px;
}

.status{
    text-align:center;
    color:var(--green);
    margin-top:12px;
    opacity:0;
    transition:.3s;
    font-size:14px;
}

.status.show{
    opacity:1;
}

.footer{
    border-top:1px solid var(--border);
    padding:20px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    color:var(--muted);
    font-size:13px;
}

.footer i{
    color:var(--green);
}

@media(max-width:700px){

    .header,
    .content,
    .footer{
        padding-left:20px;
        padding-right:20px;
    }

    .title{
        font-size:26px;
    }

    .footer{
        flex-direction:column;
        gap:10px;
        text-align:center;
    }
}
</style>
</head>
<body>

<div class="container">

<div class="card">

<div class="header">

<div class="logo">
<i class="fa-solid fa-terminal"></i>
</div>

<div class="title">
xdayoungx Hub
<span class="online-dot"></span>
</div>

<div class="subtitle">
Grow a Garden 2 최신 스크립트 제공<br>
현재 모든 서비스가 정상적으로 운영되고 있습니다.
</div>

</div>

<div class="content">

<div class="badges">
<div class="badge"><i class="fa-solid fa-bolt"></i> Latest Build</div>
<div class="badge"><i class="fa-solid fa-shield-halved"></i> Stable</div>
<div class="badge"><i class="fa-solid fa-server"></i> Online</div>
</div>

<div class="script-card">

<div class="script-title">
<i class="fa-solid fa-code"></i>
메인 스크립트
</div>

<div class="code-box">
<code id="script1">loadstring(game:HttpGet("https://api.ssgontop.shop/gag2"))()</code>
</div>

<button class="copy-btn" onclick="copyScript('script1','status1',this)">
<i class="fa-regular fa-copy"></i>
스크립트 복사
</button>

<div class="status" id="status1">복사 완료</div>

</div>

<div class="script-card">

<div class="script-title">
<i class="fa-solid fa-robot"></i>
자동 훔치기 스크립트
</div>

<div class="code-box">
<code id="script2">loadstring(game:HttpGet("https://api.ssgontop.shop/gag2steal"))()</code>
</div>

<button class="copy-btn" onclick="copyScript('script2','status2',this)">
<i class="fa-regular fa-copy"></i>
스크립트 복사
</button>

<div class="status" id="status2">복사 완료</div>

</div>

</div>

<div class="footer">
<div>
<i class="fa-solid fa-circle"></i>
서비스 정상 운영중
</div>

<div>
Build 2026.06
</div>
</div>

</div>

</div>

<script>

async function copyScript(scriptId,statusId,button){

    const text=document.getElementById(scriptId).innerText;
    const status=document.getElementById(statusId);

    try{

        await navigator.clipboard.writeText(text);

        button.innerHTML='<i class="fa-solid fa-check"></i> 복사 완료';
        status.classList.add("show");

        setTimeout(()=>{
            button.innerHTML='<i class="fa-regular fa-copy"></i> 스크립트 복사';
            status.classList.remove("show");
        },2500);

    }catch{

        alert("클립보드 권한이 필요합니다.");

    }
}

</script>

</body>
</html>
