```html
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>점검중</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111315;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: white;
      overflow: hidden;
    }

    .container {
      width: 90%;
      max-width: 620px;
      text-align: center;
      padding: 55px 40px;
      border-radius: 24px;
      background: #181a1d;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 10px 35px rgba(0,0,0,0.35);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px 18px;
      border-radius: 999px;
      background: #202328;
      color: rgba(255,255,255,0.75);
      font-size: 14px;
      margin-bottom: 30px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #ff5a5a;
    }

    h1 {
      font-size: clamp(34px, 5vw, 52px);
      line-height: 1.15;
      letter-spacing: -1.5px;
      margin-bottom: 22px;
      font-weight: 700;
    }

    p {
      color: rgba(255,255,255,0.6);
      font-size: 17px;
      line-height: 1.8;
      margin-bottom: 36px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 16px 30px;
      border-radius: 16px;
      text-decoration: none;
      background: white;
      color: #111315;
      font-size: 15px;
      font-weight: 600;
      transition: 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .footer {
      margin-top: 28px;
      color: rgba(255,255,255,0.28);
      font-size: 13px;
      letter-spacing: 0.3px;
    }

    @media (max-width: 640px) {
      .container {
        padding: 45px 24px;
      }

      p {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="badge">
      <div class="dot"></div>
      서버 점검 진행중
    </div>

    <h1>사이트가 현재 점검중입니다</h1>

    <p>
      빠른 시일 내로 복구 예정입니다.<br>
      자세한 문의는 디스코드를 이용해주세요.
    </p>

    <a class="btn" href="https://discord.gg/YzXea8ep" target="_blank">
      디스코드 문의
    </a>

    <div class="footer">
      Temporary Maintenance
    </div>

  </div>

</body>
</html>
```
