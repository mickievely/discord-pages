<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>xdayoungx Hub</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Pretendard',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#09090b;
    overflow:hidden;
}

body::before{
    content:'';
    position:absolute;
    width:500px;
    height:500px;
    background:#22c55e;
    filter:blur(180px);
    opacity:.15;
    top:-150px;
    left:-100px;
}

body::after{
    content:'';
    position:absolute;
    width:500px;
    height:500px;
    background:#3b82f6;
    filter:blur(180px);
    opacity:.15;
    bottom:-150px;
    right:-100px;
}

.card{
    width:90%;
    max-width:800px;
    padding:45px;
    border-radius:28px;
    background:rgba(255,255,255,.04);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.08);
    box-shadow:0 20px 60px rgba(0,0,0,.4);
    position:relative;
    z-index:2;
}

.status{
    display:inline-flex;
    align-items:center;
    gap:10px;
    padding:10px 16px;
    border-radius:999px;
    background:rgba(34,197,94,.12);
    border:1px solid rgba(34,197,94,.25);
    color:#7dffac;
    font-size:13px;
    margin-bottom:25px;
}

.dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#22c55e;
    box-shadow:0 0 12px #22c55e;
}

h1{
    font-size:42px;
    font-weight:800;
    margin-bottom:15px;
    color:white;
}

.desc{
    color:rgba(255,255,255,.65);
    line-height:1.8;
    margin-bottom:35px;
}

.section-title{
    color:white;
    font-size:18px;
    font-weight:700;
    margin-bottom:15px;
}

.script-box{
    background:#0f1115;
    border:1px solid rgba(255,255,255,.08);
    border-radius:18px;
    padding:18px;
    margin-bottom:15px;
}

.script{
    color:#9ef7b8;
    font-family:Consolas,monospace;
    font-size:13px;
    word-break:break-all;
    margin-bottom:15px;
}

.copy-btn{
    width:100%;
    border:none;
    cursor:pointer;
    border-radius:12px;
    padding:14px;
    font-weight:700;
    color:white;
    background:linear-gradient(135deg,#22c55e,#16a34a);
    transition:.2s;
}

.copy-btn:hover{
    transform:translateY(-2px);
}

.actions{
    margin-top:30px;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
}

.discord{
    flex:1;
    min-width:200px;
    text-decoration:none;
    text-align:center;
    padding:16px;
    border-radius:14px;
    color:white;
    font-weight:700;
    background:#5865F2;
}

.footer{
    margin-top:25px;
    text-align:center;
    color:rgba(255,255,255,.3);
    font-size:13px;
}
</style>
</head>
<body>

<div class="card">

    <div class="status">
        <div class="dot"></div>
        xdayoungx Hub Online
    </div>

    <h1>xdayoungx Hub</h1>

    <p class="desc">
        최신 스크립트 및 업데이트 정보를 제공합니다.<br>
        문제가 발생할 경우 디스코드를 통해 문의해주세요.
    </p>

    <div class="section-title">📋 Script Copy</div>

    <div class="script-box">
        <div class="script" id="script1">
loadstring(game:HttpGet("https://api.ssgontop.shop/gag2"))()
        </div>

        <button class="copy-btn"
        onclick="copyScript('script1',this)">
        Script #1 복사
        </button>
    </div>

    <div class="script-box">
        <div class="script" id="script2">
loadstring(game:HttpGet("https://api.ssgontop.shop/gag2steal"))()
        </div>

        <button class="copy-btn"
        onclick="copyScript('script2',this)">
        Script #2 복사
        </button>
    </div>

    <div class="actions">
        <a href="https://discord.gg/YzXea8ep"
           target="_blank"
           class="discord">
           Discord Join
        </a>
    </div>

    <div class="footer">
        © 2026 xdayoungx Hub
    </div>

</div>

<script>
function copyScript(id, btn){
    const text = document.getElementById(id).innerText;

    navigator.clipboard.writeText(text).then(() => {
        const old = btn.innerText;
        btn.innerText = "✅ 복사 완료";

        setTimeout(() => {
            btn.innerText = old;
        }, 2000);
    });
}
</script>

</body>
</html>
