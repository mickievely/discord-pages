<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>점검중</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111315;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: white;
      overflow: hidden;
    }

    .container {
      width: 90%;
      max-width: 620px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 55px 40px;
      border-radius: 24px;
      background: #181a1d;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 10px 35px rgba(0,0,0,0.35);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px 18px;
      border-radius: 999px;
      background: #202328;
      color: rgba(255,255,255,0.75);
      font-size: 13px;
      margin-bottom: 30px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #ff5a5a;
    }

    h1 {
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 18px;
      font-weight: 700;
    }

    p {
      color: rgba(255,255,255,0.6);
      font-size: 17px;
      line-height: 1.8;
      margin-bottom: 36px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 16px 30px;
      border-radius: 16px;
      text-decoration: none;
      background: white;
      color: #111315;
      font-size: 15px;
      font-weight: 600;
      transition: 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .footer {
      margin-top: 28px;
      color: rgba(255,255,255,0.28);
      font-size: 13px;
      letter-spacing: 0.3px;
    }

    @media (max-width: 640px) {
      .container {
        padding: 45px 24px;
      }

      p {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="badge">
      <div class="dot"></div>
      서버 점검 진행중
    </div>

    <h1>사이트가 현재 점검중입니다</h1>

    <p>
      빠른 시일 내로 복구 예정입니다.<br>
      자세한 문의는 디스코드를 이용해주세요.
    </p>

    <a class="btn" href="https://discord.gg/YzXea8ep" target="_blank">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
        <path d="M13.545 2.907a13.227 13.227 0 0 0-3.257-1.01.05.05 0 0 0-.052.025c-.141.25-.297.577-.406.833a12.19 12.19 0 0 0-3.658 0 8.404 8.404 0 0 0-.412-.833.052.052 0 0 0-.052-.025 13.14 13.14 0 0 0-3.257 1.01.041.041 0 0 0-.019.017C.533 5.927-.32 8.854.099 11.744a.05.05 0 0 0 .018.032 13.307 13.307 0 0 0 3.995 2.018.05.05 0 0 0 .056-.019c.308-.42.582-.863.818-1.329a.05.05 0 0 0-.027-.07 8.623 8.623 0 0 1-1.248-.595.05.05 0 0 1-.005-.084c.084-.062.168-.129.248-.195a.05.05 0 0 1 .052-.007c2.619 1.196 5.454 1.196 8.041 0a.05.05 0 0 1 .053.006c.08.067.164.134.248.196a.05.05 0 0 1-.004.084 8.282 8.282 0 0 1-1.249.594.05.05 0 0 0-.026.071c.24.465.514.908.817 1.328a.05.05 0 0 0 .056.02 13.254 13.254 0 0 0 4.001-2.019.05.05 0 0 0 .018-.031c.5-3.177-.838-6.079-2.354-8.821a.041.041 0 0 0-.019-.017ZM5.943 9.67c-.807 0-1.47-.738-1.47-1.644 0-.906.654-1.644 1.47-1.644.825 0 1.478.747 1.47 1.644 0 .906-.654 1.644-1.47 1.644Zm4.114 0c-.807 0-1.47-.738-1.47-1.644 0-.906.654-1.644 1.47-1.644.825 0 1.478.747 1.47 1.644 0 .906-.645 1.644-1.47 1.644Z"/>
      </svg>
      디스코드 문의
    </a>

    <div class="footer">
      Temporary Maintenance
    </div>

  </div>

</body>
</html>
