```html
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>점검중</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Pretendard', sans-serif;
      background: #0b0f19;
      color: white;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top left, rgba(88, 101, 242, 0.35), transparent 35%),
        radial-gradient(circle at bottom right, rgba(0, 200, 255, 0.18), transparent 30%),
        #0b0f19;
      filter: blur(0px);
    }

    .card {
      position: relative;
      width: 92%;
      max-width: 620px;
      padding: 48px;
      border-radius: 28px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow:
        0 10px 40px rgba(0,0,0,0.45),
        inset 0 0 0 1px rgba(255,255,255,0.03);
      text-align: center;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 14px;
      color: rgba(255,255,255,0.82);
      margin-bottom: 28px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff5757;
      box-shadow: 0 0 12px #ff5757;
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.35);
        opacity: 0.55;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    h1 {
      font-size: clamp(34px, 5vw, 54px);
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 18px;
      letter-spacing: -1.5px;
    }

    p {
      font-size: 17px;
      line-height: 1.8;
      color: rgba(255,255,255,0.7);
      margin-bottom: 34px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 28px;
      border-radius: 16px;
      text-decoration: none;
      color: white;
      font-weight: 600;
      font-size: 16px;
      background: linear-gradient(135deg, #5865f2, #6d7cff);
      transition: 0.25s ease;
      box-shadow: 0 10px 30px rgba(88,101,242,0.35);
    }

    .btn:hover {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 14px 40px rgba(88,101,242,0.5);
    }

    .footer {
      margin-top: 26px;
      font-size: 13px;
      color: rgba(255,255,255,0.35);
    }

    .glow {
      position: absolute;
      width: 420px;
      height: 420px;
      background: rgba(88,101,242,0.14);
      border-radius: 50%;
      filter: blur(120px);
      z-index: -1;
    }

    .glow.one {
      top: -160px;
      left: -140px;
    }

    .glow.two {
      bottom: -180px;
      right: -120px;
      background: rgba(0, 183, 255, 0.12);
    }
  </style>
</head>
<body>

  <div class="bg"></div>

  <div class="card">
    <div class="glow one"></div>
    <div class="glow two"></div>

    <div class="status">
      <div class="dot"></div>
      서버 점검 진행중
    </div>

    <h1>사이트가 현재 점검중입니다</h1>

    <p>
      보다 안정적인 서비스 제공을 위해 서버 점검이 진행되고 있습니다.<br>
      빠른 시일 내로 복구 예정이며 잠시 후 다시 접속해주세요.
    </p>

    <a class="btn" href="https://discord.gg/YzXea8ep" target="_blank">
      디스코드 문의하기
    </a>

    <div class="footer">
      Temporary Maintenance Page
    </div>
  </div>

</body>
</html>
```

GitHub Pages에 `index.html` 로 업로드하면 바로 사용 가능.
